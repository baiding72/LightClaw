<!doctype html>
<html>
  <head>
    <title>申请大语言模型算法实习生</title>
  </head>
  <body data-requires-login="true">
    <h1>申请大语言模型算法实习生</h1>
    <p>请登录后继续填写申请信息。</p>
    <form>
      <input data-step-id="name" data-label="姓名" name="name" required />
      <input data-step-id="email" data-label="邮箱" name="email" type="email" required />
      <textarea data-step-id="motivation" data-label="申请说明" name="motivation"></textarea>
      <input data-step-id="resume" data-label="上传简历" name="resume" type="file" required />
      <button type="submit">提交申请</button>
    </form>
  </body>
</html>
